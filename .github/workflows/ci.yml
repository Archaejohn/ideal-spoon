name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  gut-tests:
    name: GUT unit tests (headless Godot)
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fsSL "$URL" -o /tmp/godot.zip
          unzip -o /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Import project (build resources)
        run: |
          ~/godot-bin/godot --headless --path game --import || true

      - name: Run GUT tests
        run: |
          ~/godot-bin/godot --headless --path game \
            -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests -ginclude_subdirs -gexit_on_success -gexit
